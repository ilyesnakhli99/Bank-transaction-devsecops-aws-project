<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay | Personal Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col antialiased">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-emerald-400 to-teal-500 p-2 rounded-xl text-slate-950 shadow-lg">
                    <i class="fas fa-wallet text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-white">AuraPay</span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-sm font-medium text-slate-400">
                <a href="#" class="text-emerald-400 hover:text-white transition">Account Dashboard</a>
                <a href="#" class="hover:text-white transition">Send Money</a>
                <a href="#" class="hover:text-white transition">Card Management</a>
            </div>
            <div class="flex items-center space-x-3 text-sm text-slate-400 font-mono">
                <i class="fas fa-user-circle text-xl text-slate-500"></i>
                <span>Customer Portal</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-xl w-full mx-auto px-6 py-12 flex flex-col justify-center">
        <section class="glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
            <h2 class="text-2xl font-semibold mb-2 text-white">Secure External Transfer</h2>
            <p class="text-sm text-slate-400 mb-6">Execute real-time cross-account transactions. Input verified credentials below.</p>

            <form id="transferForm" class="space-y-4">
                <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800/60 space-y-3">
                    <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block"><i class="fas fa-sign-out-alt mr-1"></i>Originating Sender (You)</span>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Account Holder Name</label>
                        <input type="text" id="username" placeholder="Ilyes" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500" required>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Your Card Number</label>
                            <input type="text" id="bank_account" placeholder="1111222233334444" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs font-mono text-slate-100 focus:outline-none focus:border-emerald-500" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Secure Pin</label>
                            <input type="password" id="secure_code" placeholder="•••" maxlength="3" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-center text-slate-100 focus:outline-none focus:border-emerald-500" required>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800/60 space-y-3">
                    <span class="text-[10px] font-bold text-teal-400 uppercase tracking-widest block"><i class="fas fa-sign-in-alt mr-1"></i>Destination Beneficiary</span>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Recipient Account Holder Name</label>
                        <input type="text" id="recipient_name" placeholder="Zaza" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Recipient Card Number</label>
                        <input type="text" id="recipient_card" placeholder="5555666677778888" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-xs font-mono text-slate-100 focus:outline-none focus:border-emerald-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-2.5 text-base font-semibold text-slate-500">$</span>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" class="w-full bg-slate-900 border border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-base font-semibold text-emerald-400 focus:outline-none focus:border-emerald-500" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 font-bold py-3 rounded-xl transition flex items-center justify-center space-x-2 text-sm shadow-xl">
                    <i class="fas fa-shield-alt"></i>
                    <span>Transfer Money</span>
                </button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById('transferForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const origContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> <span>Evaluating Ecosystem Security Rules...</span>`;

            const payload = {
                username: document.getElementById('username').value,
                bank_account: document.getElementById('bank_account').value,
                secure_code: document.getElementById('secure_code').value,
                recipient_name: document.getElementById('recipient_name').value,
                recipient_card: document.getElementById('recipient_card').value,
                amount: document.getElementById('amount').value
            };

            try {
                const response = await fetch('/send_money', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (response.ok) {
                    btn.className = "w-full bg-emerald-400 text-slate-950 font-bold py-3 rounded-xl flex items-center justify-center space-x-2 text-sm shadow-lg shadow-emerald-500/20";
                    btn.innerHTML = `<i class="fas fa-check-circle"></i> <span>${result.message}</span>`;
                } else {
                    btn.className = "w-full bg-red-500 text-white font-bold py-3 rounded-xl flex items-center justify-center space-x-2 text-sm shadow-lg shadow-red-500/20";
                    btn.innerHTML = `<i class="fas fa-times-circle"></i> <span>${result.message}</span>`;
                }
            } catch (err) {
                btn.className = "w-full bg-amber-500 text-slate-950 font-bold py-3 rounded-xl flex items-center justify-center space-x-2 text-sm";
                btn.innerHTML = `<span>Cluster Node Unreachable</span>`;
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.className = "w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 font-bold py-3 rounded-xl text-sm shadow-xl";
                    btn.innerHTML = origContent;
                }, 4000);
            }
        });
    </script>
</body>
</html>
